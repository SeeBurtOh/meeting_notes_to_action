  </text>

  <g>
    <rect x="744" y="136" width="380" height="340" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <rect x="776" y="176" width="178" height="22" rx="11" fill="rgba(255,255,255,0.12)"/>
    <rect x="970" y="176" width="118" height="34" rx="17" fill="rgba(122,215,200,0.2)" stroke="rgba(122,215,200,0.35)"/>
    <text x="993" y="198" fill="#D8FFF8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">
