    <rect x="776" y="232" width="316" height="74" rx="18" fill="rgba(255,255,255,0.06)"/>
    <rect x="794" y="250" width="170" height="12" rx="6" fill="rgba(255,255,255,0.16)"/>
    <rect x="794" y="274" width="264" height="10" rx="5" fill="rgba(255,255,255,0.12)"/>

