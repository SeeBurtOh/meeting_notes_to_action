<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1160" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1720"/>
      <stop offset="1" stop-color="#1C2B39"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7AD7C8"/>
      <stop offset="0.55" stop-color="#62BEE0"/>
      <stop offset="1" stop-color="#F0B45B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="36" fill="url(#bg)"/>

  <g opacity="0.65" filter="url(#glow)">
    <circle cx="188" cy="132" r="120" fill="#7AD7C8"/>
    <circle cx="1080" cy="128" r="112" fill="#F28E7E"/>
    <circle cx="1086" cy="530" r="148" fill="#62BEE0"/>
  </g>

  <rect x="56" y="52" width="1168" height="536" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>

  <text x="110" y="142" fill="#F0B45B" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="4">
    AI WORKFLOW DEMO
  </text>

  <text x="110" y="238" fill="#F7F0E7" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="400">
    Meeting Notes
  </text>
  <text x="110" y="322" fill="#F7F0E7" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="400">
    to Action Items
  </text>

  <text x="112" y="396" fill="#B8C2CB" font-family="Arial, Helvetica, sans-serif" font-size="29">
    Turn raw notes into summaries, action items,
  </text>
  <text x="112" y="436" fill="#B8C2CB" font-family="Arial, Helvetica, sans-serif" font-size="29">
    risks, and decisions.
  </text>

  <rect x="112" y="482" width="228" height="48" rx="24" fill="rgba(122,215,200,0.14)" stroke="rgba(122,215,200,0.36)"/>
  <text x="154" y="513" fill="#D8FFF8" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">
    Demo + Live AI
  </text>

  <g>
    <rect x="760" y="156" width="324" height="70" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.10)"/>
    <text x="792" y="199" fill="#F7F0E7" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
      Structured Output
    </text>

    <rect x="760" y="248" width="324" height="70" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.10)"/>
    <text x="792" y="291" fill="#F7F0E7" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
      OpenAI Responses API
    </text>

    <rect x="760" y="340" width="324" height="70" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.10)"/>
    <text x="792" y="383" fill="#F7F0E7" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">
      Business Workflow AI
    </text>

    <rect x="760" y="444" width="190" height="50" rx="25" fill="url(#accent)"/>
    <text x="814" y="476" fill="#081018" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">
      Analyze
    </text>
  </g>
</svg>
